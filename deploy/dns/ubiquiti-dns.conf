# Ubiquiti UniFi – Local DNS Override for GrtPhotoSync
#
# Controller UI: https://192.168.37.1 (or your UniFi Network URL)
# ─────────────────────────────────────────────────────────────────────────────
#
# Go to: Settings → Networks → (your LAN) → Advanced → DNS (or)
#         Settings → System → Custom DNS Records
#
# Add the following local DNS record:
#
#   Hostname:  GooglePhoto.sudonet.site
#   IP:        192.168.38.153   ← NPM Reverse Proxy
#   Type:      A
#
# This ensures internal clients resolve the domain directly to your NPM
# instance instead of going out to the internet and back.
#
# ─────────────────────────────────────────────────────────────────────────────
# UniFi Network Application (Hosted Controller)
# Path: Settings → System → Custom DNS Records → Add Record
#
#   Record type: A
#   Name:        GooglePhoto.sudonet.site
#   Value:       192.168.38.153
#
# ─────────────────────────────────────────────────────────────────────────────
# If you use UniFi Dream Machine / UDM Pro (Local DNS via Network menu):
# Path: UniFi Network → Settings → Networks → [your network] → DNS Host Mapping
#
#   Host: GooglePhoto.sudonet.site
#   IP:   192.168.38.153
#
# ─────────────────────────────────────────────────────────────────────────────
# Verification (from any internal machine):
#
#   nslookup GooglePhoto.sudonet.site 192.168.37.1
#   # Expected: Address: 192.168.38.153
#
#   curl -I https://GooglePhoto.sudonet.site
#   # Expected: HTTP/2 200
# ─────────────────────────────────────────────────────────────────────────────
