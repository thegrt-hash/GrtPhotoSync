# Nginx Proxy Manager – GrtPhotoSync Proxy Host Configuration
#
# Add this as a Proxy Host in your NPM UI at http://192.168.38.153:81
#
# ┌─────────────────────────────────────────────────────────┐
# │  Details Tab                                            │
# ├─────────────────────────────────────────────────────────┤
# │  Domain Names:        GooglePhoto.sudonet.site          │
# │  Scheme:              http                              │
# │  Forward Hostname/IP: 192.168.38.58                     │
# │  Forward Port:        8080                              │
# │  ☑ Cache Assets                                         │
# │  ☑ Block Common Exploits                                │
# │  ☑ Websockets Support  (needed for live sync status)    │
# └─────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────┐
# │  SSL Tab                                                │
# ├─────────────────────────────────────────────────────────┤
# │  SSL Certificate: Request a new SSL cert via Let's      │
# │                   Encrypt (or use an existing wildcard) │
# │  ☑ Force SSL                                            │
# │  ☑ HTTP/2 Support                                       │
# └─────────────────────────────────────────────────────────┘
#
# Paste the block below into the "Advanced" tab → Custom Nginx Config:

client_max_body_size 0;

proxy_read_timeout    600s;
proxy_connect_timeout  60s;
proxy_send_timeout    600s;

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# WebSocket support (live sync progress updates)
proxy_http_version 1.1;
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection "upgrade";
